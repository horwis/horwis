name: 打包Mac版程序

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 15  # 超过15分钟自动终止，防止无限卡住
    steps:
    - name: 拉取代码
      uses: actions/checkout@v4

    - name: 配置Python环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 安装依赖库（清华源加速）
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl pyinstaller -i https://pypi.tuna.tsinghua.edu.cn/simple

    - name: 执行PyInstaller打包（优化提速版）
      run: |
        pyinstaller -w --clean \
          --exclude-module matplotlib \
          --exclude-module scipy \
          --exclude-module sympy \
          --exclude-module PIL \
          --exclude-module pytest \
          --exclude-module unittest \
          --exclude-module IPython \
          --exclude-module notebook \
          --exclude-module numpy.testing \
          --exclude-module pandas.testing \
          --name 手机号合并去重工具 \
          phone_merge.py

    - name: 压缩打包产物
      run: |
        cd dist
        zip -r 手机号合并去重工具_Mac.zip 手机号合并去重工具.app

    - name: 上传可下载文件
      uses: actions/upload-artifact@v4
      with:
        name: Mac版程序包
        path: dist/手机号合并去重工具_Mac.zip
